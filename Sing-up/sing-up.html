<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp</title>
    <link rel="stylesheet" href="/Sing-up/sing-up.css" />
  </head>
  <body>
    <div class="glass-container">
      <div class="login-box">
        <h2>Sign Up</h2>
        <form action="#" method="POST">
          <input
            type="text"
            id="username"
            name="username"
            required
            placeholder="Username"
          />

          <input
            type="text"
            id="email"
            name="email"
            required
            placeholder="Email Address"
          />

          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="Password"
          />
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            required
            placeholder="Confirm Password"
          />

          <button type="submit">Register</button>
        </form>
      </div>
    </div>
  </body>
</html>
